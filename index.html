<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>포트폴리오 — 홍길동</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/static/woff2/SUIT.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── 터미널 스타일 변수 선언 ── */
    :root {
      --black: #0f0f0f;      /* 검은색 배경 */
      --hotpink: #ff007f;    /* 핫핑크 (버튼/포인트) */
      --neon-green: #00ff00; /* 야광초록 (텍스트) */
      --dark-gray: #1a1a1a;  /* 비활성화 배경 */
      --mid-gray: #7a7672;   /* 흐린 텍스트 */
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--neon-green);
      /* 한글일 땐 SUIT, 영문/기본은 터미널 Monospace 폰트 */
      font-family: 'SUIT', SF Mono, Menlo, Monaco, 'Courier New', monospace;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
    }

    /* ── SHELL ── */
    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    /* ── NAV (터미널 상단 바 느낌) ── */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem clamp(1.5rem, 6vw, 5rem);
      border-bottom: 1px solid var(--neon-green);
      background: var(--black);
      position: sticky; top: 0; z-index: 10;
    }
    .nav-logo {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: .02em;
      text-decoration: none;
      color: var(--neon-green);
      cursor: pointer;
    }
    .nav-tabs {
      display: flex;
      gap: .5rem;
      list-style: none;
    }
    .nav-tabs button {
      background: none;
      border: 1px solid transparent;
      cursor: pointer;
      font-family: inherit; /* 터미널 폰트 상속 */
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--neon-green);
      padding: .5rem 1rem;
      border-radius: 4px; /* 조금 더 각진 터미널 느낌 */
      transition: all .18s;
    }
    .nav-tabs button:hover { 
      background: var(--dark-gray); 
      border-color: var(--hotpink);
    }
    /* 활성화된 탭: 핫핑크 배경 + 야광초록 글씨 */
    .nav-tabs button.active { 
      background: var(--hotpink); 
      color: var(--neon-green); 
    }

    /* ── PAGE CONTENT ── */
    .pages { position: relative; }
    .page {
      display: none;
      opacity: 0;
      padding: clamp(3rem, 8vw, 6rem) clamp(1.5rem, 6vw, 5rem);
      max-width: 1080px;
      margin: 0 auto;
      transition: opacity .35s ease;
    }
    .page.active {
      display: block;
      animation: fadeIn .35s forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: none; }
    }

    /* ── HOME (왼쪽 프로필 사진, 오른쪽 자기소개) ── */
    .home-grid {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 4rem;
      align-items: center;
      min-height: 50vh;
    }
    /* 프로필 이미지 영역 */
    .home-profile-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      border: 2px dashed var(--neon-green); /* 터미널 감성 점선 */
      padding: 10px;
    }
    .home-profile-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(100%) contrast(120%); /* 흑백/고대비로 터미널 느낌 강조 */
    }
    .home-eyebrow {
      font-size: .72rem; font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase;
      color: var(--hotpink); margin-bottom: 1.2rem;
    }
    .home-name {
      font-size: clamp(2.5rem, 5vw, 4rem);
      line-height: 1.1;
      margin-bottom: 1.5rem;
    }
    .home-name em { font-style: normal; color: var(--hotpink); }
    .home-desc {
      color: var(--neon-green);
      font-size: 1.05rem;
      line-height: 1.8;
      margin-bottom: 2.5rem;
    }
    
    /* ── BUTTONS ── */
    .home-cta-group { display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; }
    /* 핫핑크 배경 + 야광초록 글씨 버튼 */
    .btn-dark {
      display: inline-block;
      background: var(--hotpink); 
      color: var(--neon-green);
      font-size: .78rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      text-decoration: none; border: none; cursor: pointer;
      font-family: inherit;
      padding: .85rem 1.8rem; border-radius: 4px;
      transition: opacity .2s;
    }
    .btn-dark:hover { opacity: 0.8; }
    /* 고스트 버튼도 터미널 스타일에 맞게 수정 */
    .btn-ghost {
      font-size: .78rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--neon-green); background: none; 
      border: 1px solid var(--neon-green);
      cursor: pointer; font-family: inherit;
      padding: .85rem 1.8rem; border-radius: 4px;
      transition: all .2s;
    }
    .btn-ghost:hover { background: var(--hotpink); color: var(--neon-green); border-color: var(--hotpink); }

    /* ── ABOUT ── */
    .about-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
    }
    .page-eyebrow {
      font-size: .72rem; font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase;
      color: var(--hotpink); margin-bottom: 1rem;
    }
    .page-title {
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.1;
      margin-bottom: 2.5rem;
    }
    .about-text p { color: var(--neon-green); line-height: 1.75; margin-bottom: 1.1rem; }
    .tag-list { display: flex; flex-wrap: wrap; gap: .45rem; margin-top: 2rem; }
    .tag {
      font-size: .68rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      border: 1px solid var(--neon-green); border-radius: 4px;
      padding: .28rem .8rem; color: var(--neon-green);
    }
    .about-dl dt {
      font-size: .68rem; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--hotpink); margin-top: 1.6rem;
    }
    .about-dl dd { margin-top: .3rem; font-size: .95rem; color: var(--neon-green); }
    .about-dl dt:first-child { margin-top: 0; }

    /* ── PROJECTS ── */
    .project-list { border-top: 1px solid var(--neon-green); }
    .project-item {
      display: grid;
      grid-template-columns: 2.5rem 1fr auto auto;
      align-items: center;
      gap: 1.5rem 2rem;
      padding: 1.8rem 0;
      border-bottom: 1px solid var(--neon-green);
      text-decoration: none;
      color: inherit;
      cursor: pointer;
    }
    .project-num { font-size: .72rem; font-weight: 700; color: var(--hotpink); }
    .project-info h3 {
      font-size: 1.2rem; margin-bottom: .25rem;
    }
    .project-item:hover .project-info h3 { color: var(--hotpink); }
    .project-info p { font-size: .88rem; color: var(--neon-green); opacity: 0.8; }
    .project-tags { display: flex; gap: .35rem; flex-wrap: wrap; justify-content: flex-end; }
    .project-tags span {
      font-size: .65rem; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      border: 1px solid var(--neon-green); border-radius: 4px;
      padding: .2rem .6rem; color: var(--neon-green);
    }
    .project-arrow { font-size: 1rem; color: var(--neon-green); transition: transform .2s; }
    .project-item:hover .project-arrow { transform: translate(4px,-4px); color: var(--hotpink); }

    /* ── CONTACT ── */
    .contact-layout { max-width: 620px; }
    .contact-big {
      font-size: clamp(2.2rem, 5vw, 4rem);
      line-height: 1.1;
      margin-bottom: 1.2rem;
    }
    .contact-big em { font-style: normal; color: var(--hotpink); }
    .contact-sub { color: var(--neon-green); font-size: 1rem; line-height: 1.7; margin-bottom: 3rem; max-width: 38ch; opacity: 0.8; }
    .contact-links { display: flex; flex-direction: column; gap: 0; }
    .contact-link {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.3rem 0;
      border-top: 1px solid var(--neon-green);
      text-decoration: none; color: var(--neon-green);
      transition: all .2s;
    }
    .contact-link:last-child { border-bottom: 1px solid var(--neon-green); }
    .contact-link:hover { background: var(--dark-gray); color: var(--hotpink); }
    .contact-link-label { font-size: .72rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--hotpink); }
    .contact-link-value { font-size: .95rem; }
    .contact-link-arrow { font-size: .9rem; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .home-grid { grid-template-columns: 1fr; gap: 2rem; text-align: center; }
      .home-profile-wrap { max-width: 300px; margin: 0 auto; }
      .home-cta-group { justify-content: center; }
      .about-layout { grid-template-columns: 1fr; gap: 2rem; }
      .project-item { grid-template-columns: 2rem 1fr auto; }
      .project-tags { display: none; }
    }
  </style>
</head>
<body>
<div class="shell">

  <nav>
    <span class="nav-logo" onclick="showPage('home')">홍길동_</span>
    <ul class="nav-tabs">
      <li><button onclick="showPage('home')" id="tab-home" class="active">Home</button></li>
      <li><button onclick="showPage('about')" id="tab-about">About</button></li>
      <li><button onclick="showPage('projects')" id="tab-projects">Projects</button></li>
      <li><button onclick="showPage('contact')" id="tab-contact">Contact</button></li>
    </ul>
  </nav>

  <div class="pages">

    <section class="page active" id="page-home">
      <div class="home-grid">
        <div class="home-profile-wrap">
          <img class="home-profile-img" src="https://via.placeholder.com/400" alt="프로필 사진">
        </div>
        
        <div class="home-right">
          <p class="home-eyebrow">PORTFOLIO 2026</p>
          <h1 class="home-name">홍길동<br><em>DEVELOPER_</em></h1>
          <p class="home-desc">
            사용자 경험을 고민하며 코드를 짜는<br>
            프론트엔드 개발자입니다.<br>
